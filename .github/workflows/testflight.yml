name: TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload:
    name: Build and upload
    if: ${{ vars.TESTFLIGHT_ENABLED == 'true' }}
    runs-on: macos-26
    timeout-minutes: 45

    env:
      PROJECT_PATH: Project 24Z.xcodeproj
      SCHEME: Project 24Z

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Select Xcode 26.4
        run: sudo xcode-select --switch /Applications/Xcode_26.4.app

      - name: Validate required secrets
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          test -n "$API_KEY_ID"
          test -n "$API_ISSUER_ID"
          test -n "$API_PRIVATE_KEY"

      - name: Install App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          api_key_path="${RUNNER_TEMP}/private_keys/AuthKey_${API_KEY_ID}.p8"
          mkdir -p "$(dirname "$api_key_path")"
          printf '%s' "$API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"

      - name: Validate repository structure
        run: Scripts/validate_structure.sh

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "${RUNNER_TEMP}/TestDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:'Project 24ZTests'

      - name: Archive iOS app
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${RUNNER_TEMP}/Project24Z.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${RUNNER_TEMP}/private_keys/AuthKey_${API_KEY_ID}.p8" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}"

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/Project24Z.xcarchive" \
            -exportPath "${RUNNER_TEMP}/Project24ZExport" \
            -exportOptionsPlist Config/TestFlightExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${RUNNER_TEMP}/private_keys/AuthKey_${API_KEY_ID}.p8" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Remove private key
        if: ${{ always() }}
        run: rm -rf "${RUNNER_TEMP}/private_keys"
